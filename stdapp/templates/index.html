<!DOCTYPE html>
<html>

<head>
    <title>Student CRUD</title>
</head>

<body>
    <h1>Student Form</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <hr>
    <h2>Student Data</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Course</th>
            <th>Place</th>
            <th>Action</th>
        </tr>
        {% for i in data %}
        <tr>
            <td>{{ i.name }}</td>
            <td>{{ i.age }}</td>
            <td>{{ i.email }}</td>
            <td>{{ i.course }}</td>
            <td>{{ i.place }}</td>
            <td>
                <a href="/update/{{ i.id }}/">Update</a>
                <a href="/delete/{{ i.id }}/">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
